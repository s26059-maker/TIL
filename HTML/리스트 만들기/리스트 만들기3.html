<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>중첩 리스트 만들기</title>
    </head>
    <body>
        <h3>내가 사는 이유</h3>
        <hr>
        <ul>
            <li>내가 좋알하는 음식 많아요.</li>

        <ul>
            <li>햄버거</li>
            <li>피자</li>
            <li>치킨</li>
        </ul>
        <li>라면 먹기 좋아해요</li>
        <ol type="1">
            <li>물을 끓인다.</li>
            <li>라면과 스프를 넣는다.</li>
            <li>파를 썰어 넣는다.</li>
            <li>한 입에 다 먹는다.</li>
        </ol>
        <li>여름에는 바다로</li>
        <li>가을에는 산으로</li>
        </ul>   
    </body>
</html>
